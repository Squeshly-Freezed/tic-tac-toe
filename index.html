<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
    <title>Tic-Tac-Toe</title>
</head>
<body>
    <div class="main-container">

        <div class="left-picture-container"></div>

        <div class="top-info-container">
            <div class="player-1">1</div>
            <button class="start-button">start</button>
            <div class="player-2">2</div>
            <div class="player-1-score">1: x</div>
            <div class="player-draws">0</div>
            <div class="player-2-score">2: x</div>
            <div class="player-turn"></div>
        </div>

        <div class="game-container">
            game
        </div>

        <div class="bottom-info-container">
            <button class="reset-button">reset</button>
        </div>

        <div class="right-picture-container"></div>

        <div class="footer">
            <p>Copyright © 2026 <a href="https://github.com/Squeshly-Freezed" title="Rob's GitHub">Squeshly-Freezed</a></p>
            <img class="logo" src="./img/squeshly-freezed-v2-transparent.png" alt="Squeshly-Freezed">
        </div>
    
    </div>
</body>
</html>
