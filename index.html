<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <script src="./script.js" defer></script>
    <title>Tic-Tac-Toe</title>
</head>
<body>
    <div class="main-container">

        <div class="header">TIC-TAC-TOE</div>
        <div class="top-info-container">

            <div class="player-1-container">
                <div class="player-1"></div>
                <svg class="svg-border" viewBox="0 0 100 100" preserveAspectRatio="none">
                    <rect 
                        x="5" 
                        y="5" 
                        width="90" 
                        height="90" 
                        rx="5"
                        ry="5"
                        stroke="pink"
                        stroke-width="5"
                        fill="none"
                    />
                </svg>
            </div>

            <div class="empty-container"></div>

            <div class="player-2-container">
                <div class="player-2"></div>
                <svg class="svg-border" viewBox="0 0 100 100" preserveAspectRatio="none">
                    <rect 
                        x="5" 
                        y="5" 
                        width="90" 
                        height="90" 
                        rx="5"
                        ry="5"
                        stroke="pink"
                        stroke-width="5"
                        fill="none"
                    />
                </svg>
            </div>

            <div class="player-1-score"></div>
            <div class="player-draws"></div>
            <div class="player-2-score"></div>
        </div>

        

        <div class="center-container">
            <div class="game-container"></div>
        </div>

        

        <div class="bottom-info-container">
            <button class="reset-button" type="button">RESET</button>
        </div>



        <div class="name-dialog">

        </div>

        <div class="footer">
            <p>Copyright © 2026 <a href="https://github.com/Squeshly-Freezed" title="Rob's GitHub">Squeshly-Freezed</a></p>
            <img class="logo" src="./img/squeshly-freezed-v2-transparent.png" alt="Squeshly-Freezed">
        </div>
    
    </div>
</body>
</html>
